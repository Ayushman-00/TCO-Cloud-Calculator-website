name: Build and Deploy

on:
  push:
    branches:
      - main

# Give GitHub Actions permission to commit files
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: raymephisto/tco-cloud-calculator:${{ github.sha }}

      # --- THIS IS THE NEW GITOPs STEP ---
      - name: Update Helm values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Replace the old tag with the new GitHub Commit SHA
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" tco-cloud-calculator-chart/values.yaml
          
          # Commit and Push the change back to the repository
          git add tco-cloud-calculator-chart/values.yaml
          git commit -m "Update Helm image tag to ${{ github.sha }}"
          git push